<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reviews - FreelancerHub</title>
<link rel="stylesheet" href="styles.css">
<style>
:root{--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc;--panel:#fff;--brand:#4f46e5;--brand-dark:#1e1b4b;--gold:#f59e0b;--green:#059669;}
*{box-sizing:border-box}
body{display:flex;min-height:100vh;background:var(--soft);margin:0;color:var(--ink);}
.sidebar{width:230px;background:var(--brand-dark);min-height:100vh;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.2rem;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sidebar-logo{font-weight:800;font-size:1.15rem;color:#fff;padding:.75rem 1rem;margin-bottom:1rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-radius:8px;color:rgba(255,255,255,.68);font-size:.875rem;font-weight:600;text-decoration:none;transition:all .2s;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:#fff;}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:.75rem 0;}
.nav-logout{margin-top:auto;color:#f87171!important;}
.main{flex:1;padding:2rem;overflow-y:auto;}
.page-header{display:flex;justify-content:space-between;gap:1rem;align-items:flex-end;margin-bottom:1.5rem;}
.page-title h1{font-size:1.65rem;font-weight:800;margin:0 0 .35rem;}
.page-title p{margin:0;color:var(--muted);}
.toolbar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}
.search{width:min(360px,100%);padding:.72rem .95rem;border:1px solid var(--line);border-radius:8px;background:#fff;font:inherit;outline:none;}
.search:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
.summary-grid{display:grid;grid-template-columns:1.1fr repeat(3,minmax(150px,.55fr));gap:1rem;margin-bottom:1.25rem;}
.summary-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:1.25rem;}
.rating-card{display:flex;align-items:center;gap:1.25rem;}
.score{font-size:3rem;font-weight:900;line-height:1;}
.stars{letter-spacing:.08rem;color:var(--gold);font-size:1.15rem;white-space:nowrap;}
.summary-label{font-size:.78rem;color:var(--muted);margin-top:.35rem;}
.metric-value{font-size:1.9rem;font-weight:850;}
.metric-title{font-size:.8rem;color:var(--muted);margin-top:.35rem;}
.tabs{display:flex;gap:.5rem;margin:1.25rem 0;flex-wrap:wrap;}
.tab-btn{border:1px solid var(--line);background:#fff;color:#334155;border-radius:8px;padding:.62rem .9rem;font-weight:700;cursor:pointer;}
.tab-btn.active{border-color:var(--brand);background:#eef2ff;color:#3730a3;}
.content-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:1rem;align-items:start;}
.reviews-list{display:grid;gap:.75rem;}
.review-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:1rem 1.1rem;}
.review-top{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start;margin-bottom:.85rem;}
.person{display:flex;gap:.75rem;align-items:center;min-width:0;}
.avatar{width:42px;height:42px;border-radius:50%;background:#eef2ff;color:#3730a3;display:flex;align-items:center;justify-content:center;font-weight:850;flex:0 0 auto;}
.person-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.person-sub{font-size:.8rem;color:var(--muted);margin-top:.12rem;}
.review-text{font-size:.92rem;line-height:1.65;color:#334155;margin:.75rem 0;}
.review-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem;}
.pill{display:inline-flex;align-items:center;gap:.35rem;background:#f1f5f9;color:#475569;border-radius:999px;padding:.28rem .65rem;font-size:.76rem;font-weight:700;}
.project-pill{background:#ecfdf5;color:#047857;}
.side-panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:1rem;position:sticky;top:1rem;}
.side-title{font-weight:850;margin-bottom:.85rem;}
.bar-row{display:grid;grid-template-columns:36px 1fr 28px;gap:.65rem;align-items:center;margin:.55rem 0;font-size:.78rem;color:var(--muted);}
.bar-track{height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#facc15);border-radius:999px;}
.empty{background:#fff;border:1px dashed #cbd5e1;border-radius:8px;text-align:center;padding:3rem 1rem;color:#64748b;}
.empty strong{display:block;color:#334155;margin-bottom:.35rem;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:8px;padding:1rem;}
@media(max-width:980px){.summary-grid,.content-grid{grid-template-columns:1fr}.page-header{align-items:flex-start;flex-direction:column}.search{width:100%}.sidebar{width:210px}}
@media(max-width:720px){body{display:block}.sidebar{position:relative;width:100%;height:auto;min-height:auto}.main{padding:1rem}.summary-grid{gap:.75rem}.rating-card{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">FreelancerHub</div>
  <div id="nav-links"></div>
  <div class="nav-divider"></div>
  <a class="nav-item nav-logout" href="#" onclick="logoutUser()">Logout</a>
</aside>

<main class="main">
  <div class="page-header">
    <div class="page-title">
      <h1>Reviews & Ratings</h1>
      <p>Browse feedback from clients and freelancers across FreelancerHub.</p>
    </div>
    <div class="toolbar">
      <input id="review-search" class="search" placeholder="Search by name, project, or comment">
    </div>
  </div>

  <section class="summary-grid" id="summary">
    <div class="summary-card rating-card">
      <div class="score">0.0</div>
      <div>
        <div class="stars">-----</div>
        <div class="summary-label">Loading ratings...</div>
      </div>
    </div>
    <div class="summary-card"><div class="metric-value">0</div><div class="metric-title">All Reviews</div></div>
    <div class="summary-card"><div class="metric-value">0</div><div class="metric-title">Received by You</div></div>
    <div class="summary-card"><div class="metric-value">0</div><div class="metric-title">Given by You</div></div>
  </section>

  <div class="tabs">
    <button class="tab-btn active" data-tab="all">All Reviews</button>
    <button class="tab-btn" data-tab="received">Reviews Received</button>
    <button class="tab-btn" data-tab="given">Reviews Given</button>
  </div>

  <section class="content-grid">
    <div id="reviews-list" class="reviews-list">
      <div class="empty"><strong>Loading reviews...</strong><span>Fetching review data from Railway backend.</span></div>
    </div>
    <aside class="side-panel">
      <div class="side-title">Rating Breakdown</div>
      <div id="rating-bars"></div>
    </aside>
  </section>
</main>

<script src="js/api.js"></script>
<script>
if (!getToken()) window.location.href = 'login.html';

const role = getRole();
const userId = Number(getUserId());
const state = { all: [], received: [], given: [], tab: 'all', query: '' };

document.getElementById('nav-links').innerHTML = role === 'client' ? `
  <a class="nav-item" href="client-dashboard.html">Dashboard</a>
  <a class="nav-item" href="my-projects.html">My Projects</a>
  <a class="nav-item" href="messages.html">Messages</a>
  <a class="nav-item" href="contracts.html">Contracts</a>
  <a class="nav-item active" href="reviews.html">Reviews</a>` : `
  <a class="nav-item" href="freelancer-dashboard.html">Dashboard</a>
  <a class="nav-item" href="my-bids.html">My Bids</a>
  <a class="nav-item" href="contracts.html">Contracts</a>
  <a class="nav-item" href="messages.html">Messages</a>
  <a class="nav-item active" href="reviews.html">Reviews</a>`;

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tab = btn.dataset.tab;
    render();
  });
});

document.getElementById('review-search').addEventListener('input', event => {
  state.query = event.target.value.trim().toLowerCase();
  render();
});

function stars(rating) {
  const n = Math.round(Number(rating) || 0);
  return Array.from({ length: 5 }, (_, i) => i < n ? '&#9733;' : '&#9734;').join('');
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function nameOf(user) {
  return user?.name || 'Unknown user';
}

function reviewLabel(review) {
  const reviewer = nameOf(review.reviewer);
  const reviewee = nameOf(review.reviewee);
  if (review.reviewer?.userId === userId) return `You reviewed ${reviewee}`;
  if (review.reviewee?.userId === userId) return `${reviewer} reviewed you`;
  return `${reviewer} reviewed ${reviewee}`;
}

function activeReviews() {
  const list = state[state.tab] || [];
  if (!state.query) return list;
  return list.filter(r => [
    r.comment,
    r.project?.title,
    r.reviewer?.name,
    r.reviewee?.name,
    String(r.rating)
  ].some(v => String(v || '').toLowerCase().includes(state.query)));
}

function renderSummary() {
  const ratings = state.all.map(r => Number(r.rating) || 0);
  const total = state.all.length;
  const avg = total ? ratings.reduce((a, b) => a + b, 0) / total : 0;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card rating-card">
      <div class="score">${avg.toFixed(1)}</div>
      <div>
        <div class="stars">${stars(avg)}</div>
        <div class="summary-label">Average rating from backend reviews</div>
      </div>
    </div>
    <div class="summary-card"><div class="metric-value">${total}</div><div class="metric-title">All Reviews</div></div>
    <div class="summary-card"><div class="metric-value">${state.received.length}</div><div class="metric-title">Received by You</div></div>
    <div class="summary-card"><div class="metric-value">${state.given.length}</div><div class="metric-title">Given by You</div></div>`;

  const max = Math.max(total, 1);
  document.getElementById('rating-bars').innerHTML = [5,4,3,2,1].map(score => {
    const count = state.all.filter(r => Number(r.rating) === score).length;
    return `<div class="bar-row">
      <div>${score} star</div>
      <div class="bar-track"><div class="bar-fill" style="width:${count / max * 100}%"></div></div>
      <div>${count}</div>
    </div>`;
  }).join('');
}

function render() {
  renderSummary();
  const list = activeReviews();
  const el = document.getElementById('reviews-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><strong>No reviews found</strong><span>Try another tab or search term.</span></div>`;
    return;
  }

  el.innerHTML = list.map(review => {
    const reviewer = nameOf(review.reviewer);
    const reviewee = nameOf(review.reviewee);
    const initial = reviewer.charAt(0).toUpperCase();
    return `<article class="review-card">
      <div class="review-top">
        <div class="person">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div>
            <div class="person-name">${escapeHtml(reviewLabel(review))}</div>
            <div class="person-sub">Reviewer: ${escapeHtml(reviewer)} &middot; Reviewee: ${escapeHtml(reviewee)}</div>
          </div>
        </div>
        <div class="stars" title="${escapeHtml(review.rating)} out of 5">${stars(review.rating)}</div>
      </div>
      <div class="review-text">${escapeHtml(review.comment || 'No comment provided.')}</div>
      <div class="review-meta">
        <span class="pill project-pill">${escapeHtml(review.project?.title || 'Project')}</span>
        <span class="pill">Rating ${escapeHtml(review.rating || 0)}/5</span>
        <span class="pill">Review #${escapeHtml(review.reviewId)}</span>
      </div>
    </article>`;
  }).join('');
}

async function loadReviews() {
  try {
    const [all, received, given] = await Promise.all([
      getAllReviews().catch(() => []),
      getReviewsForUser(userId).catch(() => []),
      getReviewsGiven(userId).catch(() => [])
    ]);

    state.all = Array.isArray(all) ? all : [];
    state.received = Array.isArray(received) ? received : state.all.filter(r => r.reviewee?.userId === userId);
    state.given = Array.isArray(given) ? given : state.all.filter(r => r.reviewer?.userId === userId);
    render();
  } catch (error) {
    document.getElementById('reviews-list').innerHTML =
      `<div class="error">Could not load reviews from the backend. Please redeploy the backend with the new reviews endpoint.</div>`;
  }
}

loadReviews();
</script>
</body>
</html>
