<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — FreelancerHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Create Account</h2>

        <div id="error-msg" class="error-msg" style="display:none"></div>
        <div id="success-msg" class="success-msg" style="display:none"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 8 characters">
        </div>
        <div class="form-group">
            <label>I am a...</label>
            <select id="role">
                <option value="client">Client — I want to hire</option>
                <option value="freelancer">Freelancer — I want to work</option>
            </select>
        </div>

        <button id="register-btn" class="btn-primary full-width">Create Account</button>
        <p class="auth-link">Have an account? <a href="login.html">Login</a></p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-btn').addEventListener('click', async () => {
            const name     = document.getElementById('name').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role     = document.getElementById('role').value;
            const errorDiv = document.getElementById('error-msg');
            const successDiv = document.getElementById('success-msg');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!name || !email || !password) {
                errorDiv.textContent = 'All fields are required.';
                errorDiv.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                // Sends data to Java → Java saves to MySQL
                const data = await registerUser(name, email, password, role);

                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                } else {
                    successDiv.textContent = 'Account created! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Is the Java backend running?';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
