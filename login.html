<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — FreelancerHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Sign in to your FreelancerHub account</p>

        <div id="error-msg" class="error-msg" style="display:none"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn" class="btn-primary full-width">Sign In</button>

        <p class="auth-link">No account? <a href="register.html">Register here</a></p>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            const btn      = document.getElementById('login-btn');

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const data = await loginUser(email, password);  // calls Java API

                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                } else {
                    // Redirect based on role saved from Java response
                    const role = localStorage.getItem('role');
                    window.location.href = role === 'client'
                        ? 'client-dashboard.html'
                        : 'freelancer-dashboard.html';
                }
            } catch (err) {
                errorDiv.textContent = 'Server error. Is the Java backend running?';
                errorDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
