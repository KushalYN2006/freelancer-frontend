<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Bids — FreelancerHub</title>
<link rel="stylesheet" href="styles.css">
<style>
body{display:flex;min-height:100vh;background:#F8FAFC;margin:0;}
.sidebar{width:230px;background:#1E1B4B;min-height:100vh;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:.2rem;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sidebar-logo{font-weight:800;font-size:1.15rem;color:#fff;padding:.75rem 1rem;margin-bottom:1rem;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;border-radius:8px;color:rgba(255,255,255,.65);font-size:.875rem;font-weight:500;text-decoration:none;transition:all .2s;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:#fff;}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:.75rem 0;}
.nav-logout{margin-top:auto;color:#F87171!important;}
.main{flex:1;padding:2rem;overflow-y:auto;}
.page-header{margin-bottom:1.5rem;}
.page-header h1{font-size:1.5rem;font-weight:700;color:#0F172A;margin:0 0 .3rem;}
.page-header p{color:#64748B;margin:0;}
.stats-row{display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;}
.mini-stat{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:1rem 1.25rem;flex:1;min-width:130px;}
.mini-stat-val{font-size:1.6rem;font-weight:800;color:#0F172A;}
.mini-stat-label{font-size:.78rem;color:#64748B;margin-top:.15rem;}
.filter-row{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.bid-card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:1.25rem;margin-bottom:.75rem;transition:box-shadow .2s;}
.bid-card:hover{box-shadow:0 4px 16px rgba(79,70,229,.1);}
.bid-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:.75rem;}
.bid-proj-title{font-weight:700;font-size:.95rem;color:#0F172A;}
.bid-proj-meta{font-size:.8rem;color:#64748B;margin-top:.2rem;}
.bid-amount{font-size:1.2rem;font-weight:800;color:#4F46E5;white-space:nowrap;}
.bid-proposal{font-size:.87rem;color:#475569;line-height:1.6;padding:.75rem;background:#F8FAFC;border-radius:8px;margin-top:.5rem;}
.empty{text-align:center;padding:3rem;color:#94A3B8;}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">🚀 FreelancerHub</div>
  <a class="nav-item" href="freelancer-dashboard.html">📊 Dashboard</a>
  <a class="nav-item active" href="my-bids.html">💼 My Bids</a>
  <a class="nav-item" href="contracts.html">📄 Contracts</a>
  <a class="nav-item" href="messages.html">💬 Messages</a>
  <a class="nav-item" href="reviews.html">⭐ Reviews</a>
  <div class="nav-divider"></div>
  <a class="nav-item nav-logout" href="#" onclick="logoutUser()">🚪 Logout</a>
</aside>
<main class="main">
  <div class="page-header">
    <h1>💼 My Bids</h1>
    <p>Track all bids you've placed on projects.</p>
  </div>
  <div class="stats-row">
    <div class="mini-stat"><div class="mini-stat-val" id="s-total">—</div><div class="mini-stat-label">Total Bids</div></div>
    <div class="mini-stat"><div class="mini-stat-val" id="s-pending" style="color:#F59E0B">—</div><div class="mini-stat-label">Pending</div></div>
    <div class="mini-stat"><div class="mini-stat-val" id="s-accepted" style="color:#10B981">—</div><div class="mini-stat-label">Accepted</div></div>
    <div class="mini-stat"><div class="mini-stat-val" id="s-rejected" style="color:#EF4444">—</div><div class="mini-stat-label">Rejected</div></div>
  </div>
  <div class="filter-row">
    <button class="btn btn-outline btn-sm" onclick="filter('all',this)">All</button>
    <button class="btn btn-ghost btn-sm" onclick="filter('pending',this)">Pending</button>
    <button class="btn btn-ghost btn-sm" onclick="filter('accepted',this)">Accepted</button>
    <button class="btn btn-ghost btn-sm" onclick="filter('rejected',this)">Rejected</button>
  </div>
  <div id="bids-list"><div class="empty"><div class="empty-icon">⏳</div><p>Loading your bids...</p></div></div>
</main>
<script src="js/api.js"></script>
<script>
requireAuth('freelancer');
let allBids=[];

async function load() {
  const bids = await getFreelancerBids(getUserId()).catch(()=>[]);
  allBids = Array.isArray(bids)?bids:[];
  document.getElementById('s-total').textContent    = allBids.length;
  document.getElementById('s-pending').textContent  = allBids.filter(b=>b.status==='pending').length;
  document.getElementById('s-accepted').textContent = allBids.filter(b=>b.status==='accepted').length;
  document.getElementById('s-rejected').textContent = allBids.filter(b=>b.status==='rejected').length;
  render(allBids);
}

function filter(status, btn) {
  document.querySelectorAll('.filter-row button').forEach(b=>b.className='btn btn-ghost btn-sm');
  if(btn) btn.className='btn btn-outline btn-sm';
  render(status==='all'?allBids:allBids.filter(b=>b.status===status));
}

function render(bids) {
  const el = document.getElementById('bids-list');
  if (!bids.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><p>No bids in this category.</p><a href="freelancer-dashboard.html" class="btn btn-primary" style="margin-top:1rem;display:inline-block">Browse Projects</a></div>`; return; }
  el.innerHTML = bids.map(b=>`
    <div class="bid-card">
      <div class="bid-card-header">
        <div>
          <div class="bid-proj-title">${projectTitle(b)}</div>
          <div class="bid-proj-meta">
            💰 Budget: $${b.project?.budget||'—'} &nbsp;|&nbsp;
            📅 Deadline: ${formatDate(b.project?.deadline)} &nbsp;|&nbsp;
            👤 Client: ${b.project?.client?.name||'—'}
          </div>
        </div>
        <div style="text-align:right">
          <div class="bid-amount">$${b.bidAmount}</div>
          <div style="margin-top:.3rem">${statusBadge(b.status)}</div>
        </div>
      </div>
      <div class="bid-proposal">"${b.proposal||''}"</div>
      ${b.status==='accepted'?`<div style="margin-top:.75rem;display:flex;gap:.5rem"><button class="btn btn-outline btn-sm" onclick="window.location.href='messages.html?to=${b.project?.client?.userId}'">💬 Message Client</button><a href="contracts.html" class="btn btn-primary btn-sm">📄 View Contract</a></div>`:''}
    </div>`).join('');
}
load();
</script>
</body></html>
