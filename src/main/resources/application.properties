# Database — Heroku sets JAWSDB_URL automatically
spring.datasource.url=${JAWSDB_URL:jdbc:mysql://localhost:3306/freelancerhub?useSSL=false&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Port — Heroku assigns this automatically
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:freelancerhub_local_secret}
jwt.expiration=86400000